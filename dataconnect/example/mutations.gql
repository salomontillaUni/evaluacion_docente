# ─── Data Connect Mutations ──────────────────────────────────────────────────

mutation createUser($email: String!, $nombre: String!, $role: String!) {
  user_insert(data: {
    email: $email
    fullName: $nombre
    role: $role
    isActive: true
    # Next.js will handle createdAt/updatedAt if we don't specify, 
    # but some schemas require them if not defaulted in SQL.
  })
}
